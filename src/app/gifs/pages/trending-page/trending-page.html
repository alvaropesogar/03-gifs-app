<div class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-5 h-screen overflow-y-scroll"
(scroll)="onScroll($event)"
#groupDiv
>
  @for (group of gifService.trendingGifGroup(); track $index) {
    <div class="grid gap-4">
      @for (item of group; track item.id) {
        <div>
          <img class="h-auto max-w-full rounded-md" [src]="item.url" [alt]="item.title" />
        </div>
      }
    </div>
  }
</div>
